tables:
  patients:
    file_path: "hosp/patients.csv.gz"
    patient_id: "subject_id"
    timestamp: null
    attributes:
      - "gender"
      - "anchor_age"
      - "anchor_year"
      - "anchor_year_group"
      - "dod"
    dtype_mapping:
      patients/gender: "String"
      patients/anchor_age: "UInt"
      patients/anchor_year: "UInt"
      patients/anchor_year_group: "String"
      patients/dod: "Date"

  admissions:
    file_path: "hosp/admissions.csv.gz"
    patient_id: "subject_id"
    timestamp: "admittime"
    attributes:
      - "hadm_id"
      - "admission_type"
      - "admission_location"
      - "insurance"
      - "language"
      - "marital_status"
      - "race"
      - "discharge_location"
      - "dischtime"
      - "hospital_expire_flag"
    dtype_mapping:
      admissions/dischtime: "DateTime"
      admissions/admission_type: "String"
      admissions/admission_location: "String"
      admissions/discharge_location: "String"
      admissions/insurance: "String"
      admissions/language: "String"
      admissions/marital_status: "String"
      admissions/race: "String"
      admissions/hospital_expire_flag: "Boolean"

  icustays:
    file_path: "icu/icustays.csv.gz"
    patient_id: "subject_id"
    timestamp: "intime"
    attributes:
      - "hadm_id"
      - "stay_id"
      - "first_careunit"
      - "last_careunit"
      - "outtime"
    dtype_mapping:
      icustays/hadm_id: "String"
      icustays/stay_id: "String"
      icustays/first_careunit: "String"
      icustays/last_careunit: "String"
      icustays/outtime: "DateTime"

  diagnoses_icd:
    file_path: "hosp/diagnoses_icd.csv.gz"
    patient_id: "subject_id"
    join:
      - file_path: "hosp/admissions.csv.gz"
        "on": "hadm_id"
        how: "inner"
        columns:
          - "dischtime"
    timestamp: "dischtime"
    attributes:
      - "hadm_id"
      - "icd_code"
      - "icd_version"
      - "seq_num"
    dtype_mapping:
      diagnoses_icd/hadm_id: "String"
      diagnoses_icd/seq_num: "UInt"
      diagnoses_icd/icd_code: "String"
      diagnoses_icd/icd_version: "String"

  procedures_icd:
    file_path: "hosp/procedures_icd.csv.gz"
    patient_id: "subject_id"
    join:
      - file_path: "hosp/admissions.csv.gz"
        "on": "hadm_id"
        how: "inner"
        columns:
          - "dischtime"
    timestamp: "dischtime"
    attributes:
      - "hadm_id"
      - "icd_code"
      - "icd_version"
      - "seq_num"
    dtype_mapping:
      procedures_icd/hadm_id: "String"
      procedures_icd/seq_num: "UInt"
      procedures_icd/icd_code: "String"
      procedures_icd/icd_version: "String"

  prescriptions:
    file_path: "hosp/prescriptions.csv.gz"
    patient_id: "subject_id"
    timestamp: "starttime"
    attributes:
      - "hadm_id"
      - "drug"
      - "ndc"
      - "prod_strength"
      - "dose_val_rx"
      - "dose_unit_rx"
      - "route"
      - "stoptime"
    dtype_mapping:
      prescriptions/dose_unit_rx: "String"
      prescriptions/dose_val_rx: "Float"
      prescriptions/drug: "String"
      prescriptions/hadm_id: "String"
      prescriptions/ndc: "String"
      prescriptions/prod_strength: "String"
      prescriptions/route: "String"
      prescriptions/stoptime: "DateTime"

  labevents:
    file_path: "hosp/labevents.csv.gz"
    patient_id: "subject_id"
    join:
      - file_path: "hosp/d_labitems.csv.gz"
        "on": "itemid"
        how: "inner"
        columns:
          - "label"
          - "fluid"
          - "category"
    timestamp: "charttime"
    attributes:
      - "hadm_id"
      - "itemid"
      - "label"
      - "fluid"
      - "category"
      - "value"
      - "valuenum"
      - "valueuom"
      - "flag"
      - "storetime"
    dtype_mapping:
      labevents/hadm_id: "String"
      labevents/storetime: "DateTime"
      labevents/value: "String" # Numerical and qualitative
      labevents/valuenum: "Float" # Numerical only
      labevents/valueuom: "String"
      labevents/flag: "String"

  hcpcsevents:
    file_path: "hosp/hcpcsevents.csv.gz"
    patient_id: "subject_id"
    timestamp: "chartdate"
    attributes:
      - "hadm_id"
      - "hcpcs_cd"
      - "seq_num"
      - "short_description"
    dtype_mapping:
      hcpcsevents/hadm_id: "String"
      hcpcsevents/hcpcs_cd: "String"
      hcpcsevents/seq_num: "UInt"
      hcpcsevents/short_description: "String"
